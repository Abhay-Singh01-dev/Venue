name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      GEMINI_API_KEY: ci-test-gemini-key
      FIREBASE_PROJECT_ID: ci-test-flowstate-project
      GOOGLE_CLOUD_PROJECT: ci-test-flowstate-project
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pip-audit

      - name: Ruff lint report
        continue-on-error: true
        run: ruff check app tests --output-format=github

      - name: Mypy type report
        continue-on-error: true
        run: mypy app --ignore-missing-imports

      - name: Python dependency audit
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Run backend tests with coverage
        run: pytest tests -q --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=55

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: ESLint frontend
        run: npx eslint src --ext .ts,.tsx --max-warnings 20

      - name: Run frontend tests
        run: npm run test:run

      - name: Run frontend accessibility tests
        run: npm run test:a11y

      - name: Build frontend
        run: npm run build
